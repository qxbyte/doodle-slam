name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Syntax check every script
        run: |
          for f in $(find js sw.js test -name '*.js'); do
            node --check "$f"
          done
      - name: Unit tests
        run: node test/run.js
